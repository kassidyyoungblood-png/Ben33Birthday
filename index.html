<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 33 | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0b10;
            --neon-blue: #00d2ff;
            --neon-white: #ffffff;
            --card-height: 380px;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; text-shadow: 0 0 10px var(--neon-blue); }

        .vision-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            perspective: 1500px; /* Crucial for 3D depth */
        }

        .card-container { height: var(--card-height); cursor: pointer; }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; /* Keep front and back on different planes */
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Shared sides styling */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            backface-visibility: hidden; /* Hides the reverse side */
            -webkit-backface-visibility: hidden;
        }

        /* Front specific */
        .card-front {
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 2; /* Ensure front is on top */
            transform: rotateY(0deg); /* Explicitly set base rotation */
        }

        .card-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
        }

        .card-content-front {
            position: relative;
            padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, transparent 100%);
            z-index: 3;
        }

        .card-content-front h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin: 0;
            text-transform: uppercase;
        }

        /* Back specific */
        .card-back {
            background-color: #0d0e14;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border: 2px solid var(--neon-blue);
            transform: rotateY(180deg); /* This flips the back so it faces the "other way" */
        }

        .card-back h3 { color: var(--neon-blue); font-family: 'Orbitron', sans-serif; margin-bottom: 10px; }
        .card-back p { text-align: center; font-size: 0.9rem; line-height: 1.5; color: #ddd; margin-bottom: 25px; }

        .directions-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--neon-blue);
            color: #000;
            padding: 12px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .directions-link svg { fill: currentColor; }

        .day-label {
            width: 100%; max-width: 1000px;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            border-left: 4px solid var(--neon-blue);
            padding-left: 15px;
            margin: 40px 0 20px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>LEVEL 33</h1>
    </header>

    <div class="day-label">PHASE 01 // SATURDAY</div>
    <div class="vision-board">
        <div class="card-container" onclick="handleFlip(this, event)">
            <div class="card-inner">
                
                <div class="card-front">
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?w=500');"></div>
                    <div class="card-content-front"><h3>Brunch</h3></div>
                </div>

                <div class="card-back">
                    <h3>The Kickoff</h3>
                    <p>Fueling up for the big mission.</p>
                    <a href="#" target="_blank" class="directions-link">
                        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        Navigate
                    </a>
                </div>

            </div>
        </div>

        <div class="card-container" onclick="handleFlip(this, event)">
            <div class="card-inner">
                <div class="card-front">
                    <div class="card-bg" style="background-image: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=500');"></div>
                    <div class="card-content-front"><h3>Arcade</h3></div>
                </div>
                <div class="card-back">
                    <h3>Game Time</h3>
                    <p>Neon competition and retro classics.</p>
                    <a href="#" target="_blank" class="directions-link">
                        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        Navigate
                    </a>
                </div>
            </div>
        </div>

        </div>

    <script>
        function handleFlip(card, event) {
            // Prevent flip if clicking the button
            if (event.target.closest('.directions-link')) {
                return;
            }
            card.classList.toggle('is-flipped');
        }
    </script>
</body>
</html>
