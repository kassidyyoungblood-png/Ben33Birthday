<html lang="en">

    <title>The Big 33 | Birthday Itinerary</title>

    <style>
        :root {
            --bg-color: #f4f1ea;
            --accent-color: #ff5a5f;
            --card-height: 380px;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Permanent Marker', cursive; font-size: 3.5rem; color: #333; margin: 0; transform: rotate(-1.5deg); }

        .day-label {
            width: 100%; max-width: 1000px;
            font-family: 'Permanent Marker', cursive;
            font-size: 2.2rem; margin: 40px 0 20px 0;
            border-bottom: 3px solid #333;
        }

        .vision-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
            perspective: 1000px;
        }

        .card-container { height: var(--card-height); cursor: pointer; position: relative; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Front Styling */
        .card-front { background-color: #fff; display: flex; flex-direction: column; justify-content: flex-end; color: white; }
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.75); }
        .card-content-front { position: relative; padding: 25px; }
        .card-content-front h3 { font-size: 1.8rem; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* Back Styling */
        .card-back {
            background-color: #ffffff; color: #333;
            transform: rotateY(180deg);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 30px; box-sizing: border-box;
            border: 5px solid var(--accent-color);
        }

        .card-back h3 { font-family: 'Permanent Marker', cursive; font-size: 1.6rem; margin-bottom: 10px; color: #333; }
        .card-back p { line-height: 1.5; font-size: 0.95rem; text-align: center; color: #555; }

        /* Directions Pin Button */
        .directions-link {
            margin-top: 20px;
            display: flex;
            align-items: center;
            background: #f0f0f0;
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.3s;
            border: 1px solid #ddd;
        }

        .directions-link:hover { background: #e8e8e8; }
        .directions-link svg { margin-right: 8px; fill: var(--accent-color); }
